<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이도훈의 지뢰찾기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --cell-size: 30px;
            --cell-bg: #cbd5e1;
            --cell-revealed: #ffffff;
            --cell-border: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        .game-container {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .board {
            display: grid;
            gap: 2px;
            background-color: var(--cell-border);
            border: 4px solid var(--cell-border);
            margin: 1rem auto;
            width: fit-content;
            border-radius: 0.25rem;
            overflow: hidden;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
            font-size: 1.1rem;
            position: relative;
        }

        .cell:hover:not(.revealed) {
            background-color: #94a3b8;
            transform: scale(1.05);
            z-index: 10;
        }

        .cell.revealed {
            background-color: var(--cell-revealed);
            cursor: default;
            animation: reveal 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes reveal {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cell.mine {
            background-color: #ef4444;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .cell.flagged::after {
            content: '🚩';
            font-size: 0.8rem;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* 세련된 숫자 색상 */
        .n-1 { color: #2563eb; } /* Blue */
        .n-2 { color: #16a34a; } /* Green */
        .n-3 { color: #dc2626; } /* Red */
        .n-4 { color: #7c3aed; } /* Purple */
        .n-5 { color: #991b1b; } /* Dark Red */
        .n-6 { color: #0891b2; } /* Cyan */
        .n-7 { color: #1e293b; } /* Slate */
        .n-8 { color: #475569; } /* Gray */

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: #f1f5f9;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-variant-numeric: tabular-nums;
        }

        .difficulty-btn {
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-active {
            background-color: #0f172a;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #status-btn {
            font-size: 1.5rem;
            padding: 0.25rem;
            line-height: 1;
            transition: transform 0.2s;
        }

        #status-btn:hover {
            transform: rotate(20deg) scale(1.1);
        }

        #status-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1 class="text-4xl font-black mb-8 text-slate-900 tracking-tight">이도훈의 지뢰찾기</h1>

    <div class="flex flex-wrap gap-2 justify-center mb-6">
        <button onclick="setDifficulty('easy')" id="btn-easy" class="difficulty-btn bg-slate-200 hover:bg-slate-300">초급</button>
        <button onclick="setDifficulty('medium')" id="btn-medium" class="difficulty-btn bg-slate-200 hover:bg-slate-300">중급</button>
        <button onclick="setDifficulty('hard')" id="btn-hard" class="difficulty-btn bg-slate-200 hover:bg-slate-300">고급</button>
        <button onclick="setDifficulty('expert')" id="btn-expert" class="difficulty-btn bg-slate-200 hover:bg-slate-300 text-red-600">초고급</button>
    </div>

    <div class="stats-bar text-slate-800">
        <div class="flex items-center gap-2">
            <span>💣</span> <span id="mine-count">0</span>
        </div>
        <div id="status-btn" class="cursor-pointer" onclick="initGame()">🔄</div>
        <div class="flex items-center gap-2">
            <span>⏱️</span> <span id="timer">000</span>
        </div>
    </div>

    <div id="board" class="board"></div>

    <div class="mt-8 grid grid-cols-2 gap-4 text-xs font-medium text-slate-400 uppercase tracking-widest">
        <div>Left Click: Reveal</div>
        <div>Right Click: Flag</div>
    </div>
</div>

<script>
    const CONFIGS = {
        easy: { rows: 9, cols: 9, mines: 10, cellSize: '34px' },
        medium: { rows: 16, cols: 16, mines: 40, cellSize: '30px' },
        hard: { rows: 16, cols: 30, mines: 99, cellSize: '24px' },
        expert: { rows: 30, cols: 30, mines: 200, cellSize: '20px' }
    };

    let currentDifficulty = 'easy';
    let board = [];
    let revealedCount = 0;
    let flaggedCount = 0;
    let timerInterval = null;
    let seconds = 0;
    let gameOver = false;
    let firstClick = true;

    function setDifficulty(diff) {
        currentDifficulty = diff;
        document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('btn-active', 'bg-slate-200'));
        document.getElementById(`btn-${diff}`).classList.add('btn-active');
        
        // 난이도별 셀 크기 조정
        document.documentElement.style.setProperty('--cell-size', CONFIGS[diff].cellSize);
        
        initGame();
    }

    function initGame() {
        clearInterval(timerInterval);
        seconds = 0;
        revealedCount = 0;
        flaggedCount = 0;
        gameOver = false;
        firstClick = true;
        document.getElementById('timer').innerText = '000';
        
        const config = CONFIGS[currentDifficulty];
        document.getElementById('mine-count').innerText = config.mines;
        
        createBoard(config);
    }

    function createBoard(config) {
        const boardElement = document.getElementById('board');
        boardElement.innerHTML = '';
        boardElement.style.gridTemplateColumns = `repeat(${config.cols}, var(--cell-size))`;
        
        board = [];
        for (let r = 0; r < config.rows; r++) {
            const row = [];
            for (let c = 0; c < config.cols; c++) {
                const cell = {
                    r, c,
                    isMine: false,
                    isRevealed: false,
                    isFlagged: false,
                    neighborMines: 0,
                    element: null
                };
                
                const el = document.createElement('div');
                el.classList.add('cell');
                el.addEventListener('click', () => handleCellClick(r, c));
                el.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    handleRightClick(r, c);
                });

                cell.element = el;
                boardElement.appendChild(el);
                row.push(cell);
            }
            board.push(row);
        }
    }

    function placeMines(excludeR, excludeC) {
        const config = CONFIGS[currentDifficulty];
        let minesPlaced = 0;
        while (minesPlaced < config.mines) {
            const r = Math.floor(Math.random() * config.rows);
            const c = Math.floor(Math.random() * config.cols);
            
            if (!board[r][c].isMine && (Math.abs(r - excludeR) > 1 || Math.abs(c - excludeC) > 1)) {
                board[r][c].isMine = true;
                minesPlaced++;
            }
        }

        for (let r = 0; r < config.rows; r++) {
            for (let c = 0; c < config.cols; c++) {
                if (!board[r][c].isMine) {
                    board[r][c].neighborMines = countNeighborMines(r, c);
                }
            }
        }
    }

    function countNeighborMines(r, c) {
        let count = 0;
        const config = CONFIGS[currentDifficulty];
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                const nr = r + dr;
                const nc = c + dc;
                if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols && board[nr][nc].isMine) {
                    count++;
                }
            }
        }
        return count;
    }

    function handleCellClick(r, c) {
        if (gameOver || board[r][c].isRevealed || board[r][c].isFlagged) return;

        if (firstClick) {
            firstClick = false;
            placeMines(r, c);
            startTimer();
        }

        revealCell(r, c);
    }

    function handleRightClick(r, c) {
        if (gameOver || board[r][c].isRevealed) return;

        const cell = board[r][c];
        cell.isFlagged = !cell.isFlagged;
        
        if (cell.isFlagged) {
            cell.element.classList.add('flagged');
            flaggedCount++;
        } else {
            cell.element.classList.remove('flagged');
            flaggedCount--;
        }
        
        const config = CONFIGS[currentDifficulty];
        document.getElementById('mine-count').innerText = Math.max(0, config.mines - flaggedCount);
    }

    function revealCell(r, c) {
        const cell = board[r][c];
        if (cell.isRevealed || cell.isFlagged) return;

        cell.isRevealed = true;
        cell.element.classList.add('revealed');
        revealedCount++;

        if (cell.isMine) {
            cell.element.classList.add('mine');
            endGame(false);
            return;
        }

        if (cell.neighborMines > 0) {
            cell.element.innerText = cell.neighborMines;
            cell.element.classList.add(`n-${cell.neighborMines}`);
        } else {
            const config = CONFIGS[currentDifficulty];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = r + dr;
                    const nc = c + dc;
                    if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                        // 약간의 딜레이를 주어 물결처럼 퍼지는 효과 연출 가능 (재귀 호출 방식)
                        revealCell(nr, nc);
                    }
                }
            }
        }

        checkWin();
    }

    function checkWin() {
        const config = CONFIGS[currentDifficulty];
        const totalCells = config.rows * config.cols;
        if (revealedCount === totalCells - config.mines) {
            endGame(true);
        }
    }

    function endGame(isWin) {
        gameOver = true;
        clearInterval(timerInterval);

        board.forEach(row => {
            row.forEach(cell => {
                if (cell.isMine) {
                    // 폭발 애니메이션을 위해 순차적으로 노출
                    setTimeout(() => {
                        cell.element.classList.add('revealed');
                        if (!isWin) cell.element.classList.add('mine');
                        cell.element.innerText = '💣';
                    }, Math.random() * 500);
                }
            });
        });

        if (isWin) {
            // 모든 지뢰에 깃발 표시
            board.forEach(row => row.forEach(c => {
                if (c.isMine) c.element.classList.add('flagged');
            }));
            setTimeout(() => alert('🎉 대단합니다! 승리하셨습니다!'), 600);
        }
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById('timer').innerText = seconds.toString().padStart(3, '0');
        }, 1000);
    }

    // 초기 난이도 설정
    setDifficulty('easy');

</script>

</body>
</html>
